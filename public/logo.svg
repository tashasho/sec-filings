<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#DB2777" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
  </defs>

  <!-- Geometric "A" logo mark — overlapping triangles -->
  <g transform="translate(2, 2)">
    <!-- Outer large triangle (pointing up) -->
    <path d="M24 3 L46 48 L2 48 Z" stroke="url(#logoGrad)" stroke-width="3" stroke-linejoin="round" fill="none" />
    <!-- Inner smaller triangle (pointing up, offset) -->
    <path d="M24 16 L38 42 L10 42 Z" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linejoin="round" fill="none" />
    <!-- Accent diagonal stroke — top-left to bottom-right -->
    <path d="M14 8 L36 48" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" />
    <!-- Accent diagonal stroke — top-right to bottom-left -->
    <path d="M34 8 L12 48" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- "ASCEND" text -->
  <text x="58" y="30" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="1.5" fill="url(#textGrad)">ASCEND</text>

  <!-- "Z5 CAPITAL" text -->
  <text x="58" y="48" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="url(#logoGrad)">Z5 CAPITAL</text>
</svg>
